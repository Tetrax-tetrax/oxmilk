<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Oxmilk's Portfolio</title>

    <link rel="preconnect" href="https://clownmilk.atabook.org">
    <link rel="preload" href="css/style.css" as="style">
    <link rel="preload" href="css/banner-marquee.css" as="style">

    <script defer src="scripts/get-banner-size.js"></script>
    <script defer src="scripts/get-bounce-img-size.js"></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/banner-marquee.css">
    <link rel="stylesheet" href="css/bounce-marquee.css">
    <link rel="stylesheet" href="css/guestbook.css">
    <link rel="stylesheet" href="css/overlay-imgs.css">

    <!-- Reference for this function -->
    <!-- https://stackoverflow.com/questions/10380787/load-iframe-after-page-load -->
    <script>
        function loadDeferredIframe() {
            var iframe = document.getElementById("my-deferred-iframe");
            iframe.src = "https://clownmilk.atabook.org"
        };
        window.onload = loadDeferredIframe;
    </script>
</head>

<body>
    <div class="marquee">
        <div class="marquee-content" id="top-banner">
            <img src="assets/wahi.webp" alt="banner">
            <img src="assets/wahi.webp" alt="banner">
            <img src="assets/wahi.webp" alt="banner">
        </div>
    </div>
    <div class="content-box">
        <div class="center-imgs">
            <div class="image-overlay-container">
                <!-- Base image -->
                <img id="main-image" src="assets/oxmilk1.webp">

                <!-- Guestbook area (logo, sticky note, border) -->
                <div class="overlay">
                    <img id="gb-box" src="assets/guestbookbox.webp" alt="Guestbook Box">
                </div>
                <div class="overlay">
                    <img id="gb-logo" src="assets/guestbooklogo.webp" alt="Guestbook Logo">
                </div>
                <div class="overlay">
                    <img id="sticky-note" src="assets/stick.webp" alt="stick">
                </div>
                <div class="overlay">
                    <img id="spook-foop" class="is-hidden" src="assets/spookfoop.webp" alt="Guestbook Logo">
                </div>
                <div class="overlay">
                    <img id="clickable-foopy" src="assets/clickhere.webp" alt="Click Here Foopy">
                </div>
                <div class="overlay">
                    <iframe src="about:blank" title="Oxmilk's Guestbook" loading="lazy" id="my-deferred-iframe"
                        class="guestbook is-hidden"></iframe>
                </div>

                <!-- Bouncing images -->
                <div class="bounce-vars">
                    <div class="bounce-container">
                        <div class="bounce-y-1">
                            <div class="bounce-x-1">
                                <img id="oxmilk-bounce" src="assets/buttonox_mix.webp">
                            </div>
                        </div>
                    </div>
                    <div class="bounce-container">
                        <div class="bounce-y-2">
                            <div class="bounce-x-2">
                                <img id="carton-bounce" src="assets/milkcarton.webp">
                            </div>
                        </div>
                    </div>
                    <div class="bounce-container">
                        <div class="bounce-y-3">
                            <div class="bounce-x-3">
                                <img id="gabagool-bounce" src="assets/gabagool.webp">
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Main image text -->
                <div class="overlay img-text" style="top: 31%; right: 28%; font-size: 162%; transform: rotate(20deg);">
                    <a href="https://www.google.com" target="_blank">Commission<br>info</a>
                </div>
                <div class="overlay img-text" style="top: 55%; right: 8%; font-size: 162%; transform: rotate(-15deg);">
                    <a href="https://www.google.com" target="_blank">Discord</a>
                </div>
                <div class="overlay img-text" style="top: 71%; right: 20%; font-size: 162%; transform: rotate(4deg);">
                    <a href="https://www.google.com" target="_blank">Social<br>Media</a>
                </div>
                <div class="overlay img-text" style="top: 88.5%; left: 11%; font-size: 200%;"><a
                        href="https://www.google.com" target="_blank">SUPPORT ME</a></div>
            </div>
        </div>
    </div>
    <div class="marquee">
        <div class="marquee-content" id="bottom-banner">
            <img src="assets/wahi.webp" alt="banner">
            <img src="assets/wahi.webp" alt="banner">
            <img src="assets/wahi.webp" alt="banner">
        </div>
    </div>

    <!-- This script toggles guestbook visibility when clicking foopy-->
    <script>
        const guestbook = document.querySelector(".guestbook");
        const clickable = document.querySelector("#clickable-foopy");
        const spook = document.querySelector("#spook-foop");
        const note = document.querySelector("#sticky-note");
        if (guestbook && clickable) {
            clickable.addEventListener('click', () => {
                guestbook.classList.toggle('is-hidden');
                spook.classList.toggle('is-hidden');
                note.classList.toggle('is-hidden');
            });
        }
    </script>
</body>

</html>
